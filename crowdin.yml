# Crowdin Configuration
# See: https://crowdin.com/project/quran-multi-lang-app
#
# To set up Crowdin:
# 1. Create a project at https://crowdin.com
# 2. Set CROWDIN_PROJECT_ID and CROWDIN_TOKEN in GitHub Secrets
# 3. Uncomment the GitHub Action in .github/workflows/crowdin.yml

project_id_env: CROWDIN_PROJECT_ID
api_token_env: CROWDIN_TOKEN

files:
  - source: /src/web/locales/en.json
    translation: /src/web/locales/%locale%.json

  - source: /docs/en/*.md
    translation: /docs/%locale%/*.md
