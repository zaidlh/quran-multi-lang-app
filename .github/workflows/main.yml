name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare mobile dependencies
        working-directory: src/mobile
        run: |
          rm -rf node_modules package-lock.json
          npm pkg set devDependencies.@react-native-community/cli-platform-android="^12.0.0"
          npm pkg set dependencies.expo-modules-core="^1.11.0"

      - name: Install dependencies
        working-directory: src/mobile
        run: npm install --legacy-peer-deps

      - name: Generate Android project if missing
        working-directory: ${{ github.workspace }}
        run: |
          if [ ! -d "src/mobile/android" ]; then
            echo "Android directory missing, generating from React Native template..."
            npx react-native@0.73 init temp_android --version 0.73.0 --package-name com.quranmobile --skip-install --replace-directory
            mv temp_android/android src/mobile/android
            rm -rf temp_android
          fi

      - name: Make gradlew executable
        working-directory: src/mobile
        run: chmod +x android/gradlew

      - name: Generate SQLite database
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p src/mobile/assets
          pip install -r scripts/requirements.txt || true
          python scripts/generate_sqlite.py --output src/mobile/assets/quran.db

      - name: Build Release APK
        working-directory: src/mobile
        run: cd android && ./gradlew assembleRelease --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: quran-app-release-apk
          path: src/mobile/android/app/build/outputs/apk/release/app-release.apk
