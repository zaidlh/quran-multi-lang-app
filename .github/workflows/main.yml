name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate SQLite database
        working-directory: ${{ github.workspace }}
        run: |
          mkdir -p src/mobile/assets
          pip install -r scripts/requirements.txt || true
          python scripts/generate_sqlite.py --output src/mobile/assets/quran.db

      - name: Generate full React Native project
        working-directory: ${{ github.workspace }}
        run: |
          if [ ! -d "src/mobile/android" ]; then
            echo "Android directory missing, generating full React Native project..."
            rm -rf temp_build
            npx react-native@0.73 init temp_build --version 0.73.0 --package-name com.quranmobile
            # Copy our source files
            cp src/mobile/App.tsx temp_build/App.tsx
            cp src/mobile/package.json temp_build/package.json
            cp src/mobile/tsconfig.json temp_build/tsconfig.json
            cp src/mobile/index.js temp_build/index.js 2>/dev/null || true
            cp src/mobile/babel.config.js temp_build/babel.config.js 2>/dev/null || true
            cp src/mobile/metro.config.js temp_build/metro.config.js 2>/dev/null || true
            # Copy assets
            mkdir -p temp_build/assets
            cp src/mobile/assets/quran.db temp_build/assets/ 2>/dev/null || true
            # Replace src/mobile with complete project
            rm -rf src/mobile
            mv temp_build src/mobile
          fi

      - name: Fix dependencies for RN 0.73 compatibility
        working-directory: src/mobile
        run: |
          # Install compatible versions
          npm install --legacy-peer-deps
          npm install @react-native/metro-config@0.73 --legacy-peer-deps
          npm install react-native-screens@3.22.0 --legacy-peer-deps
          npm install react-native-safe-area-context@4.7.0 --legacy-peer-deps
          npm install react-native-track-player@3.2.0 --legacy-peer-deps
          npm install expo-modules-core@1.5.0 --legacy-peer-deps
          npm install expo-sqlite@11.6.0 --legacy-peer-deps

      - name: Make gradlew executable
        working-directory: src/mobile
        run: chmod +x android/gradlew

      - name: Build Release APK
        working-directory: src/mobile
        run: cd android && ./gradlew assembleRelease --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: quran-app-release-apk
          path: src/mobile/android/app/build/outputs/apk/release/app-release.apk
